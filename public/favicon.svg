<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f5f75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a48;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3caac9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f7a95;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#0f3a48" stroke-width="2"/>
  
  <!-- Inner light circle (representing collaboration/shine) -->
  <circle cx="70" cy="70" r="42" fill="#e8f8fc" opacity="0.85" filter="url(#shadow)"/>
  
  <!-- Light rays on the bright circle -->
  <line x1="70" y1="30" x2="70" y2="45" stroke="#b0e0f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="95" y1="35" x2="85" y2="48" stroke="#b0e0f0" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="55" x2="95" y2="65" stroke="#b0e0f0" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Crosshatch grid on circle -->
  <line x1="50" y1="70" x2="65" y2="70" stroke="#c0e8f5" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="50" x2="70" y2="65" stroke="#c0e8f5" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="75" x2="87" y2="87" stroke="#c0e8f5" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Large "C" shape (collaboration) -->
  <path d="M 125 55 A 50 50 0 0 1 140 130 Q 125 142 110 138" 
        fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI label -->
  <g>
    <text x="50" y="60" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1f5f75">AI</text>
  </g>
  
  <!-- Checkmark (top right) -->
  <g stroke="#28b373" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="130,50 140,62 158,35"/>
  </g>
  
  <!-- User/person icon (bottom center) -->
  <circle cx="100" cy="145" r="10" fill="url(#accentGrad)"/>
  <ellipse cx="100" cy="130" rx="8" ry="7" fill="url(#accentGrad)"/>
  
</svg>
